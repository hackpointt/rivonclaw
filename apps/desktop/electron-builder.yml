appId: com.easyclaw.desktop
productName: EasyClaw

directories:
  output: release

files:
  - dist/**
  - build/trayIcon.png
  - build/trayIcon@2x.png
  - changelog.json
  - node_modules/**
  - "!node_modules/**/test_extension.node"
  - package.json

extraMetadata:
  main: dist/main.cjs

asar: true
icon: build/icon

# Files copied outside asar into Contents/Resources/
extraResources:
  # OpenClaw vendor runtime ASAR — read directly by Electron (no extraction needed).
  # Contains openclaw-runtime.asar, openclaw-runtime.asar.unpacked/, and runtime-manifest.json.
  - from: "runtime-archive"
    to: "runtime-archive"
    filter:
      - "**/*"
  # EasyClaw extensions — auto-discovered by OpenClaw at runtime
  - from: "../../extensions"
    to: "extensions"
    filter:
      - "**"
      - "!**/node_modules/**"
      - "!**/.turbo/**"
      - "!**/src/**"
      - "!**/test/**"
      - "!**/tsconfig*.json"
      - "!**/tsdown.config.*"
      - "!**/vitest.config.*"
      - "!**/*.map"
      - "!*.md"
      - "!**/README.md"
  # Volcengine STT CLI bridge script (not natively supported in OpenClaw).
  # Copied to resources root so main.ts can resolve it via process.resourcesPath.
  - from: "../../packages/gateway/dist"
    to: "."
    filter:
      - "volcengine-stt-cli.mjs"
  # Panel UI static files
  - from: "../panel/dist"
    to: "panel-dist"

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  extendInfo:
    LSUIElement: true
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  identity: null
  notarize: false
  # Only the better-sqlite3 native module in the app asar needs the
  # x64ArchFiles hint for universal builds.
  x64ArchFiles: "Contents/Resources/app.asar.unpacked/node_modules/better-sqlite3/**"
dmg:
  background: build/dmg-background.png
  iconSize: 80
  window:
    width: 590
    height: 380
  contents:
    - x: 155
      y: 200
    - x: 435
      y: 200
      type: link
      path: /Applications

publish:
  - provider: generic
    url: https://www.easy-claw.com/releases/

afterSign: scripts/notarize.cjs
